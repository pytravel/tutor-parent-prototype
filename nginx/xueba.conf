# 学霸直聘 — Nginx 反向代理配置
# 适用于腾讯云 Lighthouse + 域名绑定
#
# 使用步骤：
# 1. 将此文件复制到 /etc/nginx/sites-available/xueba.conf
# 2. 创建软链接: ln -s /etc/nginx/sites-available/xueba.conf /etc/nginx/sites-enabled/
# 3. 修改 server_name 为你的域名
# 4. 申请 SSL 证书（推荐用腾讯云免费证书）
# 5. nginx -t 测试配置
# 6. systemctl reload nginx

server {
    listen 80;
    server_name xueba.example.com;  # 改为你的域名

    # HTTP → HTTPS 重定向
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xueba.example.com;  # 改为你的域名

    # SSL 证书（腾讯云免费证书或 Let's Encrypt）
    ssl_certificate     /etc/nginx/ssl/xueba.crt;
    ssl_certificate_key /etc/nginx/ssl/xueba.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端页面
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 接口
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 限流（防止恶意请求）
        limit_req zone=api burst=20 nodelay;
    }

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|ico|svg|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# 限流配置（放在 http 块中）
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
